# .github/workflows/shared-security.yml
#
# Reusable workflow: security scanning (Stage 3, parallel with terraform)
#
# Jobs:
#   checkov  — IaC security misconfig scanning (BLOCKING on HIGH/CRITICAL)
#              Frameworks: terraform, secrets, dockerfile, github_actions
#              Results uploaded to GitHub Security tab (SARIF)
#
#   trivy    — SCA / CVE scanning in dependencies (ADVISORY — exit-code: 0)
#              Results uploaded to GitHub Security tab (SARIF)
#
# Called by consuming repos via:
#   uses: org/shared-pipelines/.github/workflows/shared-security.yml@v1

name: Shared Security

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory to scan (for checkov)"
        type: string
        default: "."
      fail-on-severity:
        description: "Minimum severity to fail on: LOW | MEDIUM | HIGH | CRITICAL"
        type: string
        default: "HIGH"

# security-events: write is required only for SARIF upload to GitHub Security tab
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  checkov:
    name: Checkov (IaC security)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: bridgecrewio/checkov-action@c77d2e7571d74e81d94a80bbda51b1b0e76e0a5a  # v20250201
        with:
          directory: ${{ inputs.working-directory }}
          # Extended framework coverage: IaC + secrets + Dockerfiles + GHA workflows
          framework: terraform,secrets,dockerfile,github_actions
          soft_fail: false
          output_format: sarif
          output_file_path: results.sarif
          config_file: .checkov.yml

      # Upload results to GitHub Security tab — runs even if checkov fails
      - uses: github/codeql-action/upload-sarif@f09c1c0a094aa517d4f3abde240c468bea46614c  # v3.28.5
        if: always()
        with:
          sarif_file: results.sarif

  trivy:
    name: Trivy (SCA / CVE — advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # Cache Trivy DB — refreshes daily (avoids re-downloading ~30 MB every run)
      - name: Cache Trivy DB
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - uses: aquasecurity/trivy-action@18f2a56c4e3b6b12b2a6b7d5e9c0a1f3d8e7b2c4  # v0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: ${{ inputs.fail-on-severity }},CRITICAL
          exit-code: 0        # advisory — never blocks the PR
          format: sarif
          output: trivy.sarif

      - uses: github/codeql-action/upload-sarif@f09c1c0a094aa517d4f3abde240c468bea46614c  # v3.28.5
        if: always()
        with:
          sarif_file: trivy.sarif
