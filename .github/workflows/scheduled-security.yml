# .github/workflows/scheduled-security.yml
#
# Scheduled full security scan — runs on the main branch on weekdays at 06:00 UTC
#
# Purpose: catch new CVEs and misconfigs that appear BETWEEN pull requests.
# A new CVE published Tuesday will not be caught by PR-only scans until
# someone opens the next PR — this workflow closes that gap.
#
# Jobs:
#   full-security-scan:
#     - gitleaks   — full history secrets scan
#     - checkov    — IaC + secrets + dockerfile + GHA misconfig (SARIF)
#     - trivy      — SCA / CVE filesystem scan (SARIF)
#
# Results are uploaded to the GitHub Security tab.
# workflow_dispatch allows manual triggering for on-demand scans.

name: Scheduled Security Scan

on:
  schedule:
    - cron: "0 6 * * 1-5"  # weekdays at 06:00 UTC
  workflow_dispatch:        # manual trigger

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-scheduled
  cancel-in-progress: true

jobs:
  full-security-scan:
    name: Full Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30  # higher than per-workflow jobs — runs all 3 tools sequentially
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # gitleaks scans full history

      # ── Secrets ─────────────────────────────────────────────────────────
      - name: gitleaks (full history)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b024a1bb7cf9b1a50d3b8d  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── IaC / config misconfig ───────────────────────────────────────────
      - name: checkov
        uses: bridgecrewio/checkov-action@c77d2e7571d74e81d94a80bbda51b1b0e76e0a5a  # v20250201
        with:
          framework: terraform,secrets,dockerfile,github_actions
          soft_fail: false
          output_format: sarif
          output_file_path: checkov.sarif
          config_file: .checkov.yml

      - name: Upload checkov SARIF
        uses: github/codeql-action/upload-sarif@f09c1c0a094aa517d4f3abde240c468bea46614c  # v3.28.5
        if: always()
        with:
          sarif_file: checkov.sarif

      # ── SCA / CVE scanning ───────────────────────────────────────────────
      - name: Cache Trivy DB
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-

      - name: trivy (SCA)
        uses: aquasecurity/trivy-action@18f2a56c4e3b6b12b2a6b7d5e9c0a1f3d8e7b2c4  # v0.30.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0
          format: sarif
          output: trivy.sarif

      - name: Upload trivy SARIF
        uses: github/codeql-action/upload-sarif@f09c1c0a094aa517d4f3abde240c468bea46614c  # v3.28.5
        if: always()
        with:
          sarif_file: trivy.sarif
