# .github/workflows/shared-cost.yml
#
# Reusable workflow: Infracost cost estimation (Stage 4 — ADVISORY)
#
# Uses a two-run comparison pattern:
#   1. Checkout base branch → infracost breakdown → /tmp/infracost-base.json
#   2. Checkout PR branch   → infracost diff      → /tmp/infracost-diff.json
#   3. Post PR comment with the cost DELTA (+$X/mo or -$X/mo)
#
# This is advisory — never blocks a PR merge.
#
# OIDC auth:
#   Pass aws-role-arn input if Terraform reads remote state from S3
#   or the AWS provider needs credentials to resolve resource prices.
#
# Called by consuming repos via:
#   uses: org/shared-pipelines/.github/workflows/shared-cost.yml@v1

name: Shared Cost Estimation

on:
  workflow_call:
    secrets:
      infracost-api-key:
        description: "Infracost API key (register free at infracost.io)"
        required: false
    inputs:
      terraform-dir:
        description: "Path to Terraform root module"
        type: string
        default: "."
      aws-role-arn:
        description: "Optional OIDC IAM Role ARN for AWS authentication"
        type: string
        default: ""

# pull-requests: write is required to create/update the PR cost comment
permissions:
  contents: read
  pull-requests: write
  id-token: write  # for OIDC (conditionally used)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  infracost:
    name: Infracost (cost delta)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Check if API key is available, skip gracefully if not
      - name: Check API key
        id: check-key
        run: |
          if [ -z "${{ secrets.infracost-api-key }}" ]; then
            echo "INFRACOST_API_KEY not set, skipping cost estimation"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        if: steps.check-key.outputs.skip != 'true'
        with:
          fetch-depth: 0  # needed to checkout base branch SHA below

      # OIDC AWS auth — only runs if aws-role-arn is provided
      - uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502  # v4.0.5
        if: steps.check-key.outputs.skip != 'true' && inputs.aws-role-arn != ''
        with:
          role-to-assume: ${{ inputs.aws-role-arn }}
          aws-region: us-east-1
          role-session-name: gha-cost-${{ github.run_id }}

      - uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832  # v3.0.1
        if: steps.check-key.outputs.skip != 'true'
        with:
          api-key: ${{ secrets.infracost-api-key }}

      # Step 1: Calculate baseline cost on the base branch
      - name: Checkout base branch
        if: steps.check-key.outputs.skip != 'true'
        run: git checkout ${{ github.event.pull_request.base.sha }}

      - name: Infracost breakdown (base branch)
        if: steps.check-key.outputs.skip != 'true'
        run: |
          infracost breakdown \
            --path "${{ inputs.terraform-dir }}" \
            --format json \
            --out-file /tmp/infracost-base.json

      # Step 2: Calculate cost on the PR branch
      - name: Checkout PR branch
        if: steps.check-key.outputs.skip != 'true'
        run: git checkout ${{ github.sha }}

      - name: Infracost diff (PR vs base)
        if: steps.check-key.outputs.skip != 'true'
        run: |
          infracost diff \
            --path "${{ inputs.terraform-dir }}" \
            --compare-to /tmp/infracost-base.json \
            --format json \
            --out-file /tmp/infracost-diff.json

      # Step 3: Post or update PR comment with cost delta
      - name: Post PR comment
        if: steps.check-key.outputs.skip != 'true'
        run: |
          infracost comment github \
            --path /tmp/infracost-diff.json \
            --repo "${{ github.repository }}" \
            --pull-request "${{ github.event.pull_request.number }}" \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --behavior update
