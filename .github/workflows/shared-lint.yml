# .github/workflows/shared-lint.yml
#
# Reusable workflow: all linters (Stage 1 + Stage 2)
#
# Config file precedence (each linter):
#   1. Local file in calling repo root  (repo-specific overrides)
#   2. Shared file from my_shared_pipeline (sensible defaults)
#
# Called by consuming repos via:
#   uses: shaposhnikoff/my_shared_pipeline/.github/workflows/shared-lint.yml@main

name: Shared Lint

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version to use for linting"
        type: string
        default: "3.11"
      terraform-version:
        description: "Terraform version for fmt/validate/tflint"
        type: string
        default: "1.9.x"
      working-directory:
        description: "Working directory for Terraform jobs"
        type: string
        default: "."

# gitleaks-action needs pull-requests: write to post PR annotations
permissions:
  contents: read
  pull-requests: write
  security-events: write

# Cancel in-progress runs on the same branch to avoid wasted compute
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: FAST — fail early on cheap checks
  # ─────────────────────────────────────────────

  secrets:
    name: Secrets Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0  # gitleaks needs full history to scan all commits

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: shaposhnikoff/my_shared_pipeline
          path: _shared
          fetch-depth: 1

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install linters (pinned, via venv)
        run: |
          python -m venv /tmp/lint-venv
          /tmp/lint-venv/bin/pip install -r _shared/requirements-lint.txt
          echo "/tmp/lint-venv/bin" >> "$GITHUB_PATH"

      - name: Run yamllint (local config preferred over shared)
        run: |
          if [ -f .yamllint.yml ]; then
            echo "Using local .yamllint.yml"
            yamllint -c .yamllint.yml .
          elif [ -f .yamllint.yaml ]; then
            echo "Using local .yamllint.yaml"
            yamllint -c .yamllint.yaml .
          else
            echo "Using shared .yamllint.yml"
            yamllint -c _shared/.yamllint.yml .
          fi

  # ─────────────────────────────────────────────
  # Stage 2: CODE — language-specific linters
  # ─────────────────────────────────────────────

  python-lint:
    name: Python Lint (ruff + black + bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: shaposhnikoff/my_shared_pipeline
          path: _shared
          fetch-depth: 1

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install linters (pinned, via venv)
        run: |
          python -m venv /tmp/lint-venv
          /tmp/lint-venv/bin/pip install -r _shared/requirements-lint.txt
          echo "/tmp/lint-venv/bin" >> "$GITHUB_PATH"

      - name: ruff check (local ruff.toml preferred over shared)
        run: |
          if [ -f ruff.toml ]; then
            echo "Using local ruff.toml (overrides subdirectory pyproject.toml configs)"
            ruff check --config ruff.toml .
          elif [ -f pyproject.toml ]; then
            echo "Using local pyproject.toml ruff config"
            ruff check .
          else
            echo "Using shared ruff.toml"
            ruff check --config _shared/ruff.toml .
          fi

      - name: black --check (formatting)
        run: black --check .

      - name: bandit (HIGH severity + HIGH confidence only)
        run: bandit -r . -lll -iii --exclude ./_shared,./tasmota/old,./tasmota_web,./tasmota/tasmota_list_devices_web.py,./mediamtx

  shell-lint:
    name: Shell Lint (shellcheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0

  dockerfile-lint:
    name: Dockerfile Lint (hadolint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for Dockerfiles
        id: df-check
        run: |
          if find . -name 'Dockerfile*' -o -name '*.dockerfile' | grep -q .; then
            echo "has_dockerfiles=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfiles=false" >> "$GITHUB_OUTPUT"
            echo "No Dockerfiles found, skipping hadolint."
          fi

      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf  # v3.1.0
        if: steps.df-check.outputs.has_dockerfiles == 'true'
        with:
          recursive: true
          # Use local .hadolint.yaml if present (hadolint-action picks it up automatically)

  terraform-lint:
    name: Terraform Lint (fmt + validate + tflint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: ${{ inputs.terraform-version }}

      - uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf  # v4.2.2
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('**/.tflint.hcl') }}
          restore-keys: tflint-

      - uses: terraform-linters/setup-tflint@19a52fbac37dacb22a09518e4ef6ee234f2d4987  # v4.0.0

      - name: Check for Terraform files
        id: tf-check
        run: |
          if find . -name '*.tf' -not -path './_shared/*' | grep -q .; then
            echo "has_tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tf=false" >> "$GITHUB_OUTPUT"
          fi

      - name: terraform fmt check
        if: steps.tf-check.outputs.has_tf == 'true'
        run: terraform fmt -check -recursive -diff

      - name: terraform init (no backend)
        if: steps.tf-check.outputs.has_tf == 'true'
        run: terraform init -backend=false

      - name: terraform validate
        if: steps.tf-check.outputs.has_tf == 'true'
        run: terraform validate

      - name: tflint
        if: steps.tf-check.outputs.has_tf == 'true'
        run: tflint --init && tflint --recursive

      - name: No Terraform files found (skipping)
        if: steps.tf-check.outputs.has_tf == 'false'
        run: echo "No .tf files found, skipping Terraform lint steps."
