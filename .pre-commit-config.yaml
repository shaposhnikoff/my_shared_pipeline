# .pre-commit-config.yaml
#
# Pre-commit hooks — local mirror of CI lint checks.
# Catches issues before push, reducing slow CI feedback loops.
#
# Setup:
#   pip install pre-commit
#   pre-commit install          # install git hooks
#   pre-commit run --all-files  # run on everything once
#
# Docs: https://pre-commit.com

repos:
  # ── Secrets ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # ── YAML ────────────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]

  # ── Python: ruff (lint + format) ────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]   # auto-fix safe issues
      - id: ruff-format

  # ── Python: black (formatting) ──────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

  # ── Python: bandit (security) ───────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-ll, -ii]  # HIGH severity + HIGH confidence (mirrors CI)
        exclude: tests/   # test files often have intentionally insecure patterns

  # ── Terraform ───────────────────────────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --tf-init-args=-backend=false  # no cloud credentials needed locally
      - id: terraform_tflint
        args:
          - --args=--recursive

  # ── General ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
